name: "Build Installers"

on:
  workflow_call:
    inputs:
      ref_type:
        required: true
        type: string
        default: "tags"
      ref:
        required: true
        type: string
      oses:
        required: true
        type: string
      environment:
        required: true
        type: string
      project_name:
        required: true
        type: string
        
jobs:
  BuildInstaller:
    name: Build Installer
    runs-on: ubuntu-latest
    environment: ${{inputs.environment}}
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        os: ${{ fromJson(inputs.oses) }}    
    steps:

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CODEBUILD_MAINLINE_INSTALLER_ROLE }}
          aws-region: us-west-2
          mask-aws-account-id: true
          role-duration-seconds: 3600
        
      - name: Build Installer Manual (Non-Release)
        if: github.workflow == 'Build Installers' && inputs.environment != 'release'
        uses: aws-actions/aws-codebuild-run-build@v1
        with:
          project-name: ${{inputs.project_name}}-${{matrix.os}}Installer
          source-version-override: refs/${{inputs.ref_type}}/${{inputs.ref}}
          hide-cloudwatch-logs: true
          artifacts-type-override: NO_ARTIFACTS

      - name: Build Installer Manual (Release)
        if: github.workflow == 'Build Installers' && inputs.environment == 'release'
        uses: aws-actions/aws-codebuild-run-build@v1
        with:
          project-name: ${{inputs.project_name}}-${{matrix.os}}Installer
          source-version-override: refs/${{inputs.ref_type}}/${{inputs.ref}}
          hide-cloudwatch-logs: true

      - name: Build Installer Release
        if: github.workflow != 'Build Installers' && inputs.environment == 'release'
        uses: aws-actions/aws-codebuild-run-build@v1
        with:
          project-name: ${{inputs.project_name}}-${{matrix.os}}Installer
          source-version-override: refs/${{inputs.ref_type}}/${{inputs.ref}}
          hide-cloudwatch-logs: true

