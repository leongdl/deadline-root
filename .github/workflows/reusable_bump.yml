
name: "Bump"

on:
  workflow_call:
    inputs:
      force_version_bump:
        required: false
        default: ""
        type: string        

jobs:
  Bump:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.CI_TOKEN }}

      - name: Checkout release notes script
        uses: actions/checkout@v4
        with:
          repository: aws-deadline/.github
          ref: mainline
          path: .dot-github
          sparse-checkout: .github/scripts/generate_release_notes.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install boto3

      - name: ConfigureGit
        run: |
          git config --local user.email ${{secrets.EMAIL}}
          git config --local user.name ${{secrets.USER}}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PGP_KEY_SECRET_ROLE }}
          aws-region: us-west-2
          mask-aws-account-id: true

      - name: NextSemver
        run: |
          BUMP_ARGS=""
          if [[ "${{ inputs.force_version_bump }}" != "" ]]; then
            BUMP_ARGS="$BUMP_ARGS --${{ inputs.force_version_bump }}"
          fi

          # Backup actual changelog to preserve its contents
          touch CHANGELOG.md
          cp CHANGELOG.md CHANGELOG.bak.md

          # Install semantic-release from requirements file
          pip install -r requirements-release.txt
          
          # Run semantic-release to generate new changelog
          NEXT_SEMVER=$(semantic-release -v --strict version --no-commit --no-push --no-tag $BUMP_ARGS)

          echo "NEXT_SEMVER=$NEXT_SEMVER" >> $GITHUB_ENV
          git checkout -b bump/$NEXT_SEMVER

      - name: GenerateChangeLog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0)
          NOTES=$(python .dot-github/.github/scripts/generate_release_notes.py "$NEXT_SEMVER" --since "$PREV_TAG" --repo "${{ github.event.repository.name }}")

          # Prepend new release notes to the original changelog
          echo "$NOTES" > NEW_LOG.md
          cat NEW_LOG.md CHANGELOG.bak.md > CHANGELOG.md
          rm NEW_LOG.md

          git add CHANGELOG.md

          # Save for PR body
          {
            echo 'RELEASE_NOTES<<EOF'
            echo "$NOTES"
            echo 'EOF'
          } >> $GITHUB_ENV

      # A precommit hook into the GitHub Action workflow.
      # If the action .github/actions/bump_precommit_hook exists in the repository
      # that is using this workflow, then this will run the workflow defined in that file.
      # That workflow must be defined to accept all of the inputs in the 'with' clause below.
      - name: PreCommitHook
        uses: ./.github/actions/bump_precommit_hook
        if: ${{ hashFiles('./.github/actions/bump_precommit_hook/action.yml') != '' }}
        with:
          semver: ${{ env.NEXT_SEMVER }}

      - name: Commit
        run: |
          git commit -sm "chore(release): $NEXT_SEMVER"

      - name: PushPR
        env:
          GH_TOKEN: ${{ secrets.CI_TOKEN }}
        run: |
          git push -u origin bump/$NEXT_SEMVER

          # Needs "Allow GitHub Actions to create and approve pull requests" under Settings > Actions
          gh pr create --base ${{ github.ref_name }} --title "chore(release): $NEXT_SEMVER" --body "$RELEASE_NOTES"
